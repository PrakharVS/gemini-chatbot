name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: docker build -t prakharvs/gemini-chatbot .

    - name: Tag image
      run: docker tag prakharvs/gemini-chatbot prakharvs/gemini-chatbot:latest

    - name: Push image
      run: docker push prakharvs/gemini-chatbot:latest