<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gemini Chatbot</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h2>Gemini Chatbot</h2>
      <button onclick="startNewChat()">+ New Chat</button>
      <div class="history-list" id="chatHistoryList"></div>
    </div>

    <div class="main-chat">
      <div id="messages" class="chat-box"></div>

      <div class="input-container">
        <input type="text" id="userInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
      </div>

      <div class="history-container">
        <button onclick="viewHistory()">View History</button>
        <button onclick="deleteHistory()">Delete History</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <script>
    // 🔥 Typing effect (word-by-word like ChatGPT)
    function typeText(element, text, speed = 20) {
      const chars = Array.from(text);
      let i = 0;

      element.innerText ="";

      function typing() {
        if (i < chars.length) {
          element.innerText += chars[i]; // ✅ plain text first
          i++;
          setTimeout(typing, speed);
        } else {
          // ✅ convert to markdown AFTER typing completes
          element.innerHTML = marked.parse(text);
        }
      }

      element.innerText = "";
      typing();
    }

    // 🚀 Send message
    async function sendMessage() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();
      if (!message) return;

      const messages = document.getElementById('messages');

      // 🧑 User message
      messages.innerHTML += `<div class="message user">${message}</div>`;
      input.value = '';
      messages.scrollTop = messages.scrollHeight;

      // 🤖 Bot placeholder
      const botDiv = document.createElement("div");
      botDiv.className = "message bot";
      botDiv.innerText = "Typing...";
      messages.appendChild(botDiv);
      messages.scrollTop = messages.scrollHeight;

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });

        const data = await res.json();

        // ✨ Typing animation
        setTimeout(() => {
          typeText(botDiv, data.reply);
        }, 500);

      } catch (err) {
        botDiv.innerText = "Error contacting the bot. Please try again.";
      }
    }

    // ⌨️ Enter key support
    document.getElementById("userInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });

    // 📜 View history
    function viewHistory() {
      fetch('/history')
        .then(res => res.json())
        .then(history => {
          const win = window.open('', 'Chat History', 'width=600,height=400');
          win.document.write('<h2>Your Chat History</h2>');
          if (history.length === 0) {
            win.document.write('<p>No history available.</p>');
          } else {
            history.forEach(chat => {
              win.document.write(`<div><b>You:</b> ${chat.userMessage}</div>`);
              win.document.write(`<div><b>Bot:</b> ${chat.botResponse}</div><hr>`);
            });
          }
          win.document.close();
        });
    }

    // ❌ Delete history
    function deleteHistory() {
      if (!confirm('Delete your chat history?')) return;
      fetch('/delete-history', { method: 'DELETE' })
        .then(() => {
          alert('Chat history deleted.');
          document.getElementById('messages').innerHTML = '';
          loadChatSessions();
        });
    }

    // 🚪 Logout
    function logout() {
      fetch('/logout', { method: 'POST' }).then(() => {
        window.location.href = '/auth.html';
      });
    }

    // ➕ New chat
    function startNewChat() {
      document.getElementById('messages').innerHTML = '';
    }

    // 📂 Load chat sessions
    async function loadChatSessions() {
      const res = await fetch('/history');
      const data = await res.json();
      const historyList = document.getElementById('chatHistoryList');
      historyList.innerHTML = '';

      data.reverse().forEach((chat) => {
        const div = document.createElement('div');
        div.innerText = chat.userMessage.slice(0, 30) + '...';
        div.onclick = () => {
          document.getElementById('messages').innerHTML = `
            <div class="message user">${chat.userMessage}</div>
            <div class="message bot">${chat.botResponse}</div>
          `;
        };
        historyList.appendChild(div);
      });
    }

    window.onload = () => {
      loadChatSessions();
    };
  </script>
</body>
</html>
